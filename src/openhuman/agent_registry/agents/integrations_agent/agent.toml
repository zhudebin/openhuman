id = "integrations_agent"
display_name = "Integrations Agent"
when_to_use = "Service integration specialist — drives a SINGLE Composio toolkit per spawn (gmail, notion, github, slack, …). The `toolkit` argument is mandatory. Use when a task should be completed via a managed OAuth integration rather than raw HTTP / file I/O."
temperature = 0.4
max_iterations = 10
iteration_policy = "extended"
sandbox_mode = "none"
omit_identity = true
omit_memory_context = true
omit_safety_preamble = false
omit_skills_catalog = true

[model]
hint = "burst"

[tools]
# Integration surface: this agent drives a single Composio toolkit per
# spawn, with managed file-storage transfer tools for attachments/artifacts.
# Workflow discovery/execution is the orchestrator's job now
# (`list_workflows` / `run_workflow`), so the old `workflow_load` /
# `workflow_phase` tools (removed with the `agent_workflows` domain) are gone.
named = [
    "composio_list_tools",
    "file_read",
    "composio_execute",
    "storage_upload_file",
    "storage_download_file",
    "storage_list_files",
    "storage_get_link",
    # Inline-in-chat OAuth connect card (#3993). When the bound toolkit is not
    # connected — or an action fails with a true auth/connection error — raise
    # the connect card with this tool and await the result, instead of bubbling
    # up "Connection error" and sending the user to Settings → Connections.
    "composio_connect",
    # Deterministic time resolver. Composio actions take time-window args
    # (Slack/Gmail/Calendar `oldest`/`latest`/`since`/`after`) as raw
    # timestamps; the model must NEVER hand-compute epoch seconds (a real
    # incident had it compute "24h ago" ~10 months off, then fetch ascending
    # from that wrong floor and miss the latest data). Resolve every time
    # bound through this tool and pass the returned value verbatim.
    "resolve_time",
]
