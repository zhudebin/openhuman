id = "orchestrator"
display_name = "Orchestrator"
when_to_use = "Staff Engineer ŌĆö routes, judges quality, synthesises. Never writes code itself. You should not normally spawn another orchestrator from inside one."
temperature = 0.4
max_iterations = 15
sandbox_mode = "none"

# Spawn hierarchy: this is the user-facing fast tier (chat model hint).
# Loader enforces: a `chat` agent must NOT list any other `chat` agent
# in `subagents` below ŌĆö handoff goes to `reasoning` (e.g. planner) for
# long-running deep work, or directly to `worker` specialists for the
# fast path. See `AgentTier` in `src/openhuman/agent/harness/definition.rs`.
agent_tier = "chat"
omit_identity = true
omit_memory_context = true
omit_safety_preamble = true
omit_skills_catalog = false
# The orchestrator is the user-facing front-line agent ŌĆö it routes,
# synthesises, and speaks to the user in their voice. PROFILE.md
# (onboarding enrichment output) anchors that voice.
omit_profile = false
# MEMORY.md ŌĆö archivist-curated long-term memory ŌĆö grounds replies in
# prior conversations and distilled user preferences. Frozen per
# session (KV-cache contract on `AgentDefinition::omit_memory_md`).
omit_memory_md = false
# Memory retrieval is ON-DEMAND, not pre-emptive. The orchestrator used to
# run `agent_memory` eagerly before every turn (`trigger_memory_agent =
# "always"`), spawning a full Ōēż15-iteration memory subagent on every
# message ŌĆö including trivial ones ŌĆö before it had even read the user's
# intent. That cost a blocking agentic round-trip per turn for a guarantee
# the model rarely needed. Instead, `agent_memory` is listed in the
# `[subagents]` allowlist below, which synthesises a `delegate_retrieve_memory`
# tool the orchestrator calls only when a message actually needs the deep
# memory-tree walk. (The frozen MEMORY.md digest still anchors every turn.)

# Delegation surface. The `collect_orchestrator_tools` helper reads this
# at agent-build time and synthesises one `delegate_*` tool per entry:
#
#   * Bare agent ids ŌåÆ one `ArchetypeDelegationTool` each, using the
#     target agent's `delegate_name` override (if any) or `delegate_{id}`
#     as the tool name, and the target's `when_to_use` as the
#     LLM-visible tool description.
#
#   * `{ skills = "*" }` ŌåÆ one `SkillDelegationTool` per connected
#     Composio toolkit, all routing to the generic `integrations_agent` with
#     the toolkit slug pre-filled as `skill_filter`.
#
# The orchestrator LLM sees these as first-class entries in its
# function-calling schema, so routing decisions happen at the tool-
# selection layer rather than hidden inside a mega-tool's enum param.
#
[subagents]
allowlist = [
    "researcher",
    "planner",
    "code_executor",
    "tools_agent",
    # Task-board/source/workflow specialist. Route any request to create,
    # edit, approve/reject, fetch, clear, remove, or summarize agent tasks,
    # proactive task sources, workflow bundles, task evidence, or artifacts
    # here instead of letting the generic tools agent see the full family.
    "task_manager_agent",
    # Settings/system specialist. Route app/core config, diagnostics,
    # service lifecycle, update, proxy, health, model-health, and cost
    # dashboard requests here so read-before-write and confirmation policy
    # stays local to the risky tools.
    "settings_agent",
    # Persistent profile/memory/persona specialist. Route "remember",
    # "forget", profile/persona edits, learned facets, and people alias
    # management here.
    "profile_memory_agent",
    # On-demand memory retrieval. Synthesised into a `delegate_retrieve_memory`
    # tool (from agent_memory's `delegate_name`). Replaces the old eager
    # `trigger_memory_agent = "always"` pre-fetch ŌĆö the orchestrator now walks
    # the memory tree only when a message needs it, not before every turn.
    "agent_memory",
    # Account/admin specialist. Route billing, team membership/invites/roles,
    # OAuth/credential/session, and referral requests here.
    "account_admin_agent",
    # Screen-awareness specialist. Route screen-intelligence permissions,
    # capture/session/listener state, and "what can you see" requests here;
    # desktop app operation still goes to desktop_control_agent.
    "screen_awareness_agent",
    # Image-understanding specialist. Route anything that hinges on the content
    # of an attached image / screenshot / on-disk image file here ŌĆö it rides the
    # multimodal `vision-v1` tier, so it can actually see the image.
    "vision_agent",
    # Image-generation specialist. Synthesised into a `delegate_create_image`
    # tool. Route make/generate/edit an image requests here ŌĆö it owns prompt
    # craft, model selection, and saving the result to the workspace.
    "image_agent",
    # Video-generation specialist. Synthesised into a `delegate_create_video`
    # tool. Route make/generate a video or animate this image requests here ŌĆö
    # generation is async (minutes) and the agent blocks until the clip is saved.
    "video_agent",
    "skill_creator",
    "critic",
    "archivist",
    # Product docs/help specialist. Route OpenHuman docs, settings,
    # setup, and feature questions here before guessing from priors.
    "help",
    # Scheduling/reminder specialist. Owns current_time + cron tools and
    # confirmation-before-create policy so the chat prompt does not carry
    # cron-specific instructions on every turn.
    "scheduler_agent",
    # Deck specialist. Owns presentation grounding, citations, image
    # verification, and generate_presentation warning handling.
    "presentation_agent",
    # Desktop-control specialist. Owns launch_app and accessibility
    # interaction policy, including list-before-press behavior.
    "desktop_control_agent",
    # Crypto wallet & market specialist (#1397). Synthesised into a
    # `delegate_do_crypto` tool at agent-build time. Route any wallet,
    # transfer, swap, contract-call, or exchange trading request here ŌĆö
    # the agent enforces a strict read ŌåÆ simulate ŌåÆ confirm ŌåÆ execute
    # contract that the generic delegation surface does not.
    "crypto_agent",
    # Prediction-market & event-contract specialist (#2427). Synthesised
    # into a `delegate_do_prediction_markets` tool at agent-build time.
    # Route any Polymarket / Kalshi (and future event-contract venue)
    # market browse, portfolio read, or order request here. The
    # `tools_agent` wildcard explicitly disallows `polymarket` / `kalshi`
    # so there is exactly one canonical route ŌĆö through this delegate ŌĆö
    # which keeps the venue-specific approval-gate prompt in scope.
    "markets_agent",
    # tiny.place specialist. Synthesised into a `use_tinyplace` tool
    # at agent-build time. Route requests about tiny.place/tinyplace, Agent
    # Cards, @handles, jobs, proposals, groups, messages, escrow,
    # registration/status, and x402 payment challenges here. This keeps the
    # tinyplace_* tool surface behind one worker instead of leaking individual
    # social-economy actions into the chat agent.
    "tinyplace_agent",
    # MCP setup specialist (#3039). Synthesised into a `delegate_setup_mcp_server`
    # tool at agent-build time. Route any "install / add / set up / connect an MCP
    # server" request here ŌĆö the agent owns the full flow: search registries ŌåÆ
    # request required secrets via a native dialog (raw values never enter the
    # agent context) ŌåÆ test the connection ŌåÆ commit the install + connect. Without
    # this entry the agent-native install path (issue #3039 gap B5) is unreachable
    # from chat.
    "mcp_setup",
    # MCP execution specialist. Synthesised into a `delegate_use_mcp_server`
    # tool at agent-build time. Route any request that should be fulfilled by
    # calling a tool on an ALREADY-CONNECTED MCP server (e.g. "answer from the
    # connected docs MCP", "query the connected X server") here ŌĆö the agent
    # discovers connected servers, lists the chosen server's tools, and invokes
    # the right one. Installing/connecting a NEW server still goes to
    # `mcp_setup`; this entry is the missing "use what's connected" route
    # (the orchestrator only has lightweight `mcp_registry_status` discovery
    # itself and must not carry every connected server's full toolset).
    "mcp_agent",
    # Skill registry specialists. `skill_setup` discovers, installs, and
    # manages agent skills from community registries (OpenHuman, HermesHub,
    # ClawHub). `skill_executor` runs an installed skill by loading its
    # SKILL.md instructions and executing the procedure.
    "skill_setup",
    "skill_executor",
    # Workflow-authoring specialist (Phase 5a). Synthesised into a
    # `build_workflow` tool at agent-build time. Route any "set up a workflow
    # thatŌĆ”", "automateŌĆ”", "when X happens do Y", or "build/edit an automation
    # or flow" request here ŌĆö it grounds nodes in real tool slugs + connections,
    # can sandbox dry-run a draft, and returns a workflow PROPOSAL for the user
    # to review and save. It never creates/enables/runs a real flow itself.
    "workflow_builder",
    # Workflow-discovery specialist (the "Flow Scout"). Synthesised into a
    # `discover_workflows` tool at agent-build time. Route "what workflows
    # should I set up?", "suggest some automations", or "discover flows for me"
    # here ŌĆö it reads the user's memory/threads/connections/flows read-only and
    # records concrete, buildable suggestions for the Flows page. It never
    # creates/enables/runs a flow; picking a suggestion routes to
    # `workflow_builder` to author it.
    "flow_discovery",
    # NOTE: `summarizer` used to be listed here for the runtime-only
    # oversized-tool-result hook. That path is currently disabled
    # (`context.summarizer_payload_threshold_tokens = 0`) after recursive
    # dispatch was observed. The agent definition is still registered via
    # `agents::loader` so the payload_summarizer machinery can resolve it
    # if the threshold is ever raised back above zero ŌĆö it just isn't
    # exposed to the orchestrator's subagent inventory right now.
    { skills = "*" },
]

[model]
# Front-line conversational agent: TTFT dominates UX. `hint:chat` resolves
# to the fast chat tier (`chat-v1` / Kimi K2.6 Turbo on
# Fireworks via backend PR #760, 128k context, `supportsThinking: false`).
# The orchestrator is a planner/router that picks a delegate and
# synthesises sub-agent output ŌĆö workload that doesn't benefit from the
# slower deep-reasoning tier. Sub-agents that need heavier reasoning
# can still opt into `reasoning-v1` (DeepSeek V4 Pro) via
# `ModelSpec::Hint("reasoning")` in their own definitions.
hint = "chat"

[tools]
# Direct tools ŌĆö things the orchestrator calls itself rather than
# delegating.
#
# `composio_list_connections` lets the agent detect newly-authorised
# integrations mid-session (the session-start fetch froze the Delegation
# Guide's connected list). `composio_connect` lets it raise an inline
# connect card for ANY toolkit the user asks to connect ŌĆö including ones
# not yet connected (#3993); the tool validates the slug against the
# backend allowlist and the OAuth handoff itself runs inside the card.
# Toolkit *action* listing and execution still live downstream in
# `integrations_agent` ŌĆö the orchestrator never calls composio_list_tools
# / composio_execute directly.
named = [
    "read_workspace_state",
    "ask_user_clarification",
    # Basic READ-ONLY direct surface ŌĆö lets the orchestrator answer small
    # lookups itself instead of spawning a sub-agent for every touch.
    # Deliberately NO write tools (`edit` / `file_write`) and NO `shell`:
    # the chat-tier orchestrator must not mutate files ŌĆö any modification,
    # however small, is deferred to `run_code` (or another owning
    # specialist) where edits live next to the build/test/verify loop.
    "file_read",
    "grep",
    "glob",
    "list",
    # Quick web/API lookups. A single fact ("what's the capital of X", "latest
    # version of Y") is one `web_search_tool` / `web_fetch` / `http_request`
    # call ŌĆö spawning the `research` worker for that is overkill. Multi-source
    # crawls, comparisons, and doc digests still delegate to `research`.
    "web_search_tool",
    "web_fetch",
    "http_request",
    # Managed file-storage transfer surface for passing artifacts/attachments
    # between chat, users, and workers. Storage lifecycle mutators
    # (`storage_set_visibility`, `storage_delete_file`) stay out of the broad
    # chat surface.
    "storage_upload_file",
    "storage_download_file",
    "storage_list_files",
    "storage_get_link",
    # NOTE: `spawn_worker_thread` is intentionally absent ŌĆö the tool is
    # disabled pending a worker-thread UI (#1624) and is not registered, so
    # listing it here (and teaching it in prompt.md) only trained the model
    # to call a tool that does not exist.
    "spawn_async_subagent",
    "spawn_parallel_agents",
    "wait",
    "wait_loop",
    # Async sub-agent control surface. prompt.md's "Async background
    # sub-agents" section instructs steering (`steer_subagent`) and result
    # collection (`wait_subagent`) by `subagent_session_id` / `task_id`;
    # both tools exist in the base registry and must be in scope here or
    # the whole async flow dead-ends after `spawn_async_subagent`.
    "steer_subagent",
    "wait_subagent",
    # Resume a sub-agent that paused on `ask_user_clarification` (#4291). When
    # a delegated sub-agent (e.g. mcp_setup via `delegate_setup_mcp_server`)
    # asks the user a question, the runner checkpoints it and the orchestrator
    # gets a `[SUBAGENT_AWAITING_USER]` envelope with the task_id/agent_id. The
    # orchestrator MUST resume that exact checkpoint with the user's answer via
    # this tool ŌĆö without it, the only continuation is to re-delegate a fresh,
    # stateless sub-agent that asks again, looping forever. Both the async
    # spawn and the synchronous delegate paths instruct the model to call it.
    "continue_subagent",
    "composio_list_connections",
    # Inline OAuth connect card (#3993). Free-form `toolkit` slug ŌĆö the
    # orchestrator calls this directly to connect a service the user names,
    # whether or not it is already connected. Validates against the backend
    # allowlist and raises the in-chat Connect card.
    "composio_connect",
    # Lightweight MCP discovery ŌĆö the orchestrator's only `mcp_registry_*`
    # tool, mirroring `composio_list_connections`. Lists the user's installed
    # MCP servers and their live connection state + tool counts so the agent
    # can tell whether a connected server can satisfy a request and route to
    # `delegate_use_mcp_server` (mcp_agent). The orchestrator deliberately does
    # NOT get `mcp_registry_list_tools` / `mcp_registry_tool_call` ŌĆö enumerating
    # and calling each connected server's tools is the delegated agent's job,
    # so the chat agent's schema stays small instead of carrying every tool of
    # every connected server.
    "mcp_registry_status",
    # Deterministic time resolver. As the chat-facing agent, the orchestrator
    # is what reads a user's relative phrase ("last 24h", "since Monday")
    # first. It must resolve the window here via `resolve_time` and hand the
    # delegated agent an exact timestamp / ISO bound rather than leaving epoch
    # arithmetic to the leaf (which once computed "24h ago" ~10 months off and
    # missed the latest data). Never hand-compute Unix seconds.
    "resolve_time",
    # Coding-harness coordination primitives from #1208. `todo` is the
    # registered unified thread task-board tool (`TodoTool::name() == "todo"`);
    # it gives the orchestrator a shared todo store to track multi-step work
    # across delegations and is what the interactive plan-review gate hooks
    # (WebChat turns stamp new cards `approval_mode = Required` ŌåÆ parked for
    # user review). The named scope matches tool names exactly, so the
    # orchestrator must list `todo` (not the legacy `todowrite` alias, which
    # resolves to no registered tool) to be able to call it. `plan_exit` is the
    # stable marker that the (forthcoming) planŌåÆbuild mode runner consumes when
    # a planner subagent hands a plan back up. Editing/navigation primitives
    # (grep/glob/edit/apply_patch/lsp) intentionally stay with downstream
    # agents ŌĆö the orchestrator coordinates, it doesn't touch files itself.
    "todo",
    # Interactive plan-review gate (Codex/Claude plan mode). After laying out a
    # multi-step plan on an interactive turn, call `request_plan_review` to PAUSE
    # the turn until the user approves / rejects / sends feedback ŌĆö nothing
    # executes until they approve. Auto-approves on non-interactive turns.
    "request_plan_review",
    # Thread-level goal (Codex-style per-thread completion contract). `goal_set`
    # records the durable objective for THIS thread when a non-trivial request
    # lands (the orchestrator is authoritative ŌĆö it always creates or replaces);
    # `goal_get` reads it back (status + token budget); `goal_complete` closes it
    # out only when evidence confirms success. Distinct from `todowrite` (this
    # thread's task board) and the long-term `goals_*` list (cross-thread). The
    # harness injects the active goal into context each turn and can auto-continue
    # it when the thread goes idle, so keeping the objective current here is what
    # keeps that loop on-target.
    "goal_set",
    "goal_get",
    "goal_complete",
    # `update_task` moves/updates a specific task card by id on a target board
    # (defaults to the proactive `task-sources` board) ŌĆö so the orchestrator can
    # advance the task it's working: ŌåÆ in_progress when it starts, ŌåÆ done with
    # evidence when finished, or ŌåÆ blocked with a reason when stuck. Complements
    # `todowrite`, which only touches the current thread's board.
    "update_task",
    "plan_exit",
    # Workflow composition. `run_workflow` runs another workflow as a
    # subagent and (by default) waits on its result like a function call;
    # `await_workflow` re-attaches to a run that outlived its inline wait.
    # `list_workflows` / `describe_workflow` let the orchestrator discover
    # what's installed and learn a workflow's inputs before running it; the
    # `*_run*` read tools let it inspect a run's status + log. All route
    # through `workflows::schemas::spawn_skill_run_background` +
    # `await_run_outcome` ŌĆö the same spawn path the `openhuman.skills_run`
    # JSON-RPC controller uses (iter cap, transcript isolation,
    # degenerate-response detector all apply).
    "list_workflows",
    "describe_workflow",
    "list_workflow_runs",
    "read_workflow_run_log",
    "run_workflow",
    "await_workflow",
    # Skill registry tools ŌĆö browse/search/install from community registries.
    # These complement list_workflows (which shows already-installed skills)
    # by exposing the remote catalog for discovery and installation.
    "skill_registry_browse",
    "skill_registry_search",
    "skill_registry_install",
    "skill_registry_sources",
    # Self-update ŌĆö lets the orchestrator answer "am I up to date" /
    # "update OpenHuman" without sending the user to Settings ŌåÆ
    # Developer Options. `update_check` is read-only; `update_apply`
    # is dangerous, requires explicit user consent through
    # `ask_user_clarification`, and respects
    # `config.update.rpc_mutations_enabled`. Implementation re-uses
    # `src/openhuman/update/` end-to-end ŌĆö no parallel release logic.
    "update_check",
    "update_apply",
    # NOTE: `generate_presentation` is intentionally NOT listed here ŌĆö deck
    # generation policy (grounding, citations, image verification) belongs to
    # `presentation_agent`, which the orchestrator reaches via
    # `delegate_make_presentation`. Listing it directly is asserted against in
    # tests/orchestrator_presentation_wiring.rs.
]
